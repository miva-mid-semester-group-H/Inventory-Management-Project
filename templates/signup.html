<!DOCTYPE html>
<html lang="
<head>
    <meta charset=" UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>signup page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>

<body>
    <header>
        <div class="logo">🏛</div>
        <div class="logo-word">INVENTORY<br>MANAGEMENT</div>
    </header>

    <div class="body">
        <!-- ✅ Added method and action -->
        <form method="POST" action="/signup">
            <div class=" container_SIGNUP">
            <h1>CREATE ACCOUNT</h1>
    </div>

    {% if error %}
                <p style="color: red;">{{ error }}</p>
            {% endif %}

    <div class="container_FORM">

        <!-- ✅ Fixed: unique name and id -->
        <div class="can">
            <label for="firstname">First Name</label><br>
            <input id="firstname" type="text" name="firstname" placeholder="First Name" required><br>
        </div>

        <!-- ✅ Fixed: unique name and id -->
        <div class="can">
            <label for="username">Username</label><br>
            <input id="username" type="text" name="username" placeholder="Username" required><br>
        </div>

        <div class="can">
            <label for="email">Email</label><br>
            <input id="email" type="email" name="email" placeholder="Email" required><br>
        </div>

        <!-- ✅ Fixed: added value attributes -->
        <div class="Gender">
            <label>Gender:</label>
            <label for="male">Male</label>
            <input id="male" type="radio" name="gender" value="male">
            <label for="female">Female</label>
            <input id="female" type="radio" name="gender" value="female"><br>
        </div>

        <!-- ✅ Fixed: type="password" -->
        <div class="can">
            <label for="password">Password</label><br>
            <input id="password" type="password" name="password" placeholder="Password" required><br>
        </div>

        <!-- ✅ Fixed: type="password" and name="confirm_password" -->
        <div class="can">
            <label for="confirm_password">Confirm Password</label><br>
            <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm Password"
                required><br>
        </div>

        <div class="check">
            <input id="checkbox" type="checkbox" required>
            <label for="checkbox">I agree with terms and services of this policy</label><br>
        </div>

        <div class="container_BUTTON">
            <button type="submit">SIGN UP</button>
        </div>
    </div>
    </form>

    <p class="login">Already have an account? <a href="/login">Log in</a></p>

    <div class="side-logo">
        <div id="first">
            <div class="logos">📦</div>
            <p class="word">Effortlessly Track<br>Your Item</p>
        </div>
        <div id="second">
            <div class="logos">🔔</div>
            <p class="word">Never Run Out Again<br>With Smart Alert</p>
        </div>
        <div id="third">
            <div class="logos">📈</div>
            <p class="word">Visualise Your<br>Inventory Value</p>
        </div>
    </div>
    </div>
</body>

</html>
